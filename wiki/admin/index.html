<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Správa Kronik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Crimson Pro', serif; background-color: #120f0e; color: #e2d1c3; }
        .medieval-font { font-family: 'MedievalSharp', cursive; }
        .admin-card { background: #1c1816; border: 1px solid #3d352f; }
        .input-field { background: #26211e; border: 1px solid #4a3f35; color: #e2d1c3; transition: all 0.3s; }
        .input-field:focus { border-color: #b28a48; outline: none; box-shadow: 0 0 5px rgba(178, 138, 72, 0.3); }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-64 bg-stone-950 border-r border-amber-900/30 flex flex-col">
        <div class="p-6 border-b border-amber-900/20">
            <h1 class="medieval-font text-amber-500 text-xl tracking-tighter text-center">SPRÁVCE ŘÍŠE</h1>
        </div>
        <nav class="flex-grow p-4 space-y-2 text-sm uppercase tracking-widest">
            <a href="#" class="block p-3 bg-amber-900/20 text-amber-500 rounded border border-amber-900/50">✍️ Nový článek</a>
            <a href="#" class="block p-3 text-stone-500 hover:bg-stone-900 rounded transition">📚 Všechny stránky</a>
            <a href="#" class="block p-3 text-stone-500 hover:bg-stone-900 rounded transition">🖼️ Galerie médií</a>
            <a href="#" class="block p-3 text-stone-500 hover:bg-stone-900 rounded transition">⚙️ Nastavení wiki</a>
        </nav>
        <div class="p-4 border-t border-stone-900">
            <a href="index.html" class="text-xs text-stone-600 hover:text-amber-700 underline">Zpět na veřejnou wiki</a>
        </div>
    </aside>

    <main class="flex-grow overflow-y-auto p-8">
        
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="medieval-font text-4xl text-amber-600">Nový záznam do kroniky</h2>
                <p class="text-stone-500 italic">"Slova mají větší moc než nabroušená ocel."</p>
            </div>
            <button onclick="savePage()" class="bg-amber-700 hover:bg-amber-600 text-stone-950 font-bold px-8 py-3 rounded shadow-lg transition-transform active:scale-95 uppercase text-sm tracking-widest">
                Zapsat do kroniky
            </button>
        </header>

        <div class="grid grid-cols-3 gap-8">
            
            <div class="col-span-2 space-y-6">
                <div class="flex flex-col">
                    <label class="text-amber-500 text-xs uppercase mb-2 ml-1">Název stránky</label>
                    <input type="text" id="pageTitle" placeholder="Např.: Proroctví o Půlnočním drakovi" class="input-field p-4 text-xl medieval-font rounded">
                </div>

                <div class="flex flex-col">
                    <label class="text-amber-500 text-xs uppercase mb-2 ml-1">Obsah (Markdown / Text)</label>
                    <textarea id="pageContent" rows="15" placeholder="Zde začni psát svůj příběh..." class="input-field p-4 font-mono text-sm rounded resize-none"></textarea>
                </div>
            </div>

            <div class="space-y-6">
                <div class="admin-card p-6 rounded">
                    <h3 class="medieval-font text-amber-600 mb-4 border-b border-stone-800 pb-2">Vlastnosti</h3>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] uppercase text-stone-500 mb-1">Kategorie</label>
                            <select class="input-field w-full p-2 text-sm rounded">
                                <option>Bestiář</option>
                                <option>Historie</option>
                                <option>Magie</option>
                                <option>Lokace</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-[10px] uppercase text-stone-500 mb-1">Viditelnost</label>
                            <div class="flex items-center space-x-4 text-sm mt-2">
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="vis" checked class="mr-2 accent-amber-600"> Veřejná
                                </label>
                                <label class="flex items-center cursor-pointer">
                                    <input type="radio" name="vis" class="mr-2 accent-amber-600"> Skrytá
                                </label>
                            </div>
                        </div>

                        <div class="pt-4">
                            <label class="block text-[10px] uppercase text-stone-500 mb-1">Tagy (oddělené čárkou)</label>
                            <input type="text" placeholder="boss, nether, oheň" class="input-field w-full p-2 text-sm rounded">
                        </div>
                    </div>
                </div>

                <div class="admin-card p-4 rounded border-dashed border-stone-700 flex flex-col items-center justify-center py-12 group cursor-pointer hover:border-amber-900 transition">
                    <span class="text-3xl mb-2 opacity-50 group-hover:scale-110 transition">🖼️</span>
                    <p class="text-[10px] uppercase text-stone-600">Nahrát titulní obrázek</p>
                </div>
            </div>

        </div>
    </main>

    <script>
async function savePage() {
    const title = document.getElementById('pageTitle').value;
    const content = document.getElementById('pageContent').value;
    const category = document.querySelector('select').value;

    const response = await fetch('http://localhost:3000/ulozit-stranku', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category })
    });

    const data = await response.json();
    alert(data.message);
}
    </script>

</body>
</html>
